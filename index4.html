    <script>
        AOS.init({ duration: 800, once: true });
        
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        
        function getUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    var lat = position.coords.latitude;
                    var lng = position.coords.longitude;
                    window.location.href = 'mechanics.php?lat=' + lat + '&lng=' + lng + '&sort=distance';
                }, function() {
                    alert('يرجى السماح بتحديد الموقع');
                });
            } else {
                alert("المتصفح لا يدعم تحديد الموقع");
            }
        }
        
        function sendMessage(receiverId, receiverType) {
            var message = prompt("أدخل رسالتك:");
            if (message) {
                $.ajax({
                    url: 'send_message.php',
                    type: 'POST',
                    data: {
                        receiver_id: receiverId,
                        receiver_type: receiverType,
                        message: message
                    },
                    success: function(response) {
                        alert("تم إرسال الرسالة بنجاح");
                    },
                    error: function() {
                        alert("حدث خطأ في إرسال الرسالة");
                    }
                });
            }
        }
    </script>
	
<script>
function checkOther(select) {
    var otherInput = document.getElementById("other-input");
    if (select.value === "other") {
        otherInput.style.display = "inline-block"; // إظهار الخانة
    } else {
        otherInput.style.display = "none"; // إخفاء الخانة
    }
}
</script>
